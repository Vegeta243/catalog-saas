# shopify.app.toml — EcomPilot Elite
# Shopify CLI 3.x format
# https://shopify.dev/docs/apps/tools/cli/configuration

name            = "EcomPilot Elite"
client_id       = "cd3da6aff7869afab614e42f45a0e1a7"
application_url = "https://www.ecompilotelite.com/shopify-embed"
embedded        = true

extension_directories = []

[access_scopes]
  scopes = "read_products,write_products,read_inventory,write_inventory,read_price_rules,write_price_rules,read_product_listings,read_orders,read_analytics"

[auth]
  redirect_urls = [
    "https://www.ecompilotelite.com/api/auth/shopify/callback",
    "https://ecompilotelite.com/api/auth/shopify/callback",
    "http://localhost:3000/api/auth/shopify/callback",
  ]

[webhooks]
  api_version = "2024-01"

  [[webhooks.subscriptions]]
    topics = ["app/uninstalled"]
    uri    = "/api/webhooks/shopify/uninstalled"

  [[webhooks.subscriptions]]
    topics = ["products/create", "products/update", "products/delete"]
    uri    = "/api/webhooks/shopify/products"

  # Note: GDPR/Privacy webhooks (customers_data_request, customers_redact, shop_redact)
  # are configured separately in Partners Dashboard > App setup > Privacy webhooks

[app_proxy]
  url     = "https://www.ecompilotelite.com/api/proxy"
  subpath = "ecompilotelite"
  prefix  = "apps"

[pos]
  embedded = false
