<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1,
    viewport-fit=cover, user-scalable=no">
  <title>EcomPilot Elite</title>
  <style>
    body {
      background: #0f172a;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(59,130,246,0.3);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script>
    window.location.href = 'https://www.ecompilotelite.com'
  </script>
</body>
</html>
