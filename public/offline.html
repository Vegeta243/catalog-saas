<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EcomPilot Elite — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f172a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont,
        'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
    p { color: #94a3b8; margin-bottom: 24px; line-height: 1.6; }
    button {
      padding: 14px 28px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <div class="icon">📡</div>
    <h1>Connexion requise</h1>
    <p>EcomPilot Elite nécessite une connexion internet.<br>
       Vérifiez votre connexion et réessayez.</p>
    <button onclick="window.location.reload()">
      Réessayer
    </button>
  </div>
</body>
</html>
